<!DOCTYPE html>
<html >
<head>
  <meta charset="UTF-8">
  <title>Wikipedia Viewer</title>
  
  
  <link rel='stylesheet prefetch' href='https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.0.0-alpha.6/css/bootstrap.min.css'>

      <link rel="stylesheet" href="css/style.css">

  
</head>

<body>
  <head>
  <title>Wikipedia viewer</title>
</head>
<body>
  <div class="container">
    <div class="col-md-12 text-center">
      <h1 style="color: white">Search for an article:</h1>
      <input type="text" class="form-control input text-center" value="Potatoes"></input>
    </div>
    <div class="col-md-12 text-center">
      <button type="button" class="btn btn-success search">Search</button>
      <a href="https://en.wikipedia.org/wiki/Special:Random" target="_blank"><button type="button" class="btn btn-success random">Random</button></a>
    </div>
  </div>
  <div class="container">
    <div class="col-md-12 results">
    </div>
  </div>
</body>
  <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js'></script>

    <script src="js/index.js"></script>

</body>
</html>
